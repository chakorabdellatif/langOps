name: langops

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langops}
      POSTGRES_DB: ${POSTGRES_DB:-langops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # exposed for local psql/debugging only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langops"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [langops]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379" # local debugging only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [langops]

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-langops}:${POSTGRES_PASSWORD:-langops}@postgres:5432/${POSTGRES_DB:-langops}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [langops]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./collector/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC  <- instrumented apps on the host
      - "4318:4318" # OTLP HTTP  <- instrumented apps on the host
    depends_on: [api]
    networks: [langops]

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on: [api]
    networks: [langops]

networks:
  langops:
    driver: bridge

volumes:
  postgres_data:
