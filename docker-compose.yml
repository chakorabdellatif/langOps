name: langops

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langops}
      POSTGRES_DB: ${POSTGRES_DB:-langops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # exposed for local psql/debugging only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langops"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [langops]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379" # local debugging only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [langops]

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-langops}:${POSTGRES_PASSWORD:-langops}@postgres:5432/${POSTGRES_DB:-langops}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: http://localhost:3000
      # Retention on by default (delete executions older than N days; 0 = keep
      # forever). Set RETENTION_PRUNE_PAYLOADS_DAYS to null payloads while
      # keeping rollups. Optional API_KEY protects ingest + query when set.
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      RETENTION_PRUNE_PAYLOADS_DAYS: ${RETENTION_PRUNE_PAYLOADS_DAYS:-0}
      API_KEY: ${LANGOPS_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      # python is in the image; curl is not. Non-200 raises → unhealthy.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [langops]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./collector/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC  <- instrumented apps on the host
      - "4318:4318" # OTLP HTTP  <- instrumented apps on the host
    depends_on:
      api: { condition: service_healthy }
    networks: [langops]

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api: { condition: service_healthy }
    networks: [langops]

networks:
  langops:
    driver: bridge

volumes:
  postgres_data:
